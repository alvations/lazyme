name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check tag matches __version__
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(python -c "import re,pathlib; print(re.search(r\"__version__\s*=\s*['\\\"]([^'\\\"]+)\", pathlib.Path('lazyme/__init__.py').read_text()).group(1))")
          echo "tag=$TAG version=$VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match __version__ $VERSION"
            exit 1
          fi

      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
